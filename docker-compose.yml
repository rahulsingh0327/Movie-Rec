version: "3.8"

services:
  app:
    build: .
    container_name: movie_app
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3000
      - DB_PATH=/app/data/movies.db
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
